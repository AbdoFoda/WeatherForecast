excluded:
  - .build
  - WeatherCore/.build
  - node_modules
  - weather-proxy
  - "**/DerivedSources"
  - "**/*.generated.swift"

identifier_name:
  # Domain- and convention-driven short names that are clearer left as-is:
  # - OpenWeatherMap API fields (dt, co, no, o3, pm2_5, ...)
  # - design-system spacing tokens (xs, sm, md, lg, xl)
  # - math/graphics coordinates and control points (x, y, w, h, r, g, b, c, cg, p0...p3)
  excluded:
    - x
    - y
    - w
    - h
    - r
    - g
    - b
    - c
    - co
    - no
    - o3
    - dt
    - cg
    - fd
    - id
    - p0
    - p1
    - p2
    - p3
    - xs
    - sm
    - md
    - lg
    - xl
    - pm2_5

nesting:
  type_level: 2

custom_rules:
  no_file_header:
    name: "File header boilerplate"
    regex: '//\s+Created by .+ on \d'
    message: "Remove Xcode file-header boilerplate (filename/author/date)."
    severity: error
