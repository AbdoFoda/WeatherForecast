name: WeatherApp
options:
  bundleIdPrefix: com.weather
  deploymentTarget:
    iOS: "18.0"
targets:
  WeatherApp:
    type: application
    platform: iOS
    sources:
      - path: WeatherApp
        excludes:
          - Info.plist
    resources:
      - path: WeatherApp/Resources
    info:
      path: WeatherApp/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        NSLocationWhenInUseUsageDescription: We need your location to show local weather.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.abdo.weather
      DEVELOPMENT_TEAM: 4S8W95348M
      CODE_SIGN_STYLE: Automatic
      GENERATE_INFOPLIST_FILE: NO
      INFOPLIST_FILE: WeatherApp/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: WeatherCore
  WeatherAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - WeatherAppTests
    resources:
      - path: WeatherAppTests/Resources
    dependencies:
      - target: WeatherApp
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.abdo.weather.tests
      TEST_HOST: $(BUILT_PRODUCTS_DIR)/WeatherApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/WeatherApp
      BUNDLE_LOADER: $(TEST_HOST)
  WeatherAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - WeatherAppUITests
      - path: WeatherApp/Support/AccessibilityIdentifier.swift
      - path: WeatherApp/Support/UITestLaunchArgument.swift
    dependencies:
      - target: WeatherApp
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.abdo.weather.uitests
      TEST_TARGET_NAME: WeatherApp
packages:
  WeatherCore:
    path: WeatherCore
schemes:
  WeatherApp:
    build:
      targets:
        WeatherApp: all
        WeatherAppTests: [test]
        WeatherAppUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WeatherAppTests
        - WeatherAppUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
